<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Pulse | Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="admin-page">
<main class="admin-shell">
    <header class="admin-topbar">
        <div>
            <p class="admin-kicker">Control Center</p>
            <h1>Aqua Pulse Admin</h1>
            <p class="admin-sub">Moderate incidents and manage response lifecycle.</p>
        </div>
        <button class="btn-danger logout" onclick="logout()">Logout</button>
    </header>

    <section class="admin-stats">
        <article class="stat-card">
            <span>Total Reports</span>
            <strong id="totalReports">0</strong>
        </article>
        <article class="stat-card">
            <span>Pending</span>
            <strong id="pendingReports">0</strong>
        </article>
        <article class="stat-card">
            <span>In Progress</span>
            <strong id="progressReports">0</strong>
        </article>
        <article class="stat-card">
            <span>Resolved</span>
            <strong id="resolvedReports">0</strong>
        </article>
    </section>

    <section class="admin-panel">
        <div class="admin-panel-head">
            <h2>Incident Moderation Queue</h2>
            <p>Confirm authenticity and update operational status.</p>
        </div>
        <div id="reports" class="admin-reports-grid"></div>
    </section>
</main>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, updateDoc, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const seededReports = [
  {
    type: "Rip Currents",
    description: "Strong pullback current observed near North Beach. Swimmers advised to avoid deep entry for the next few hours.",
    severity: "moderate",
    latitude: 19.02,
    longitude: 72.81,
    areaName: "North Beach",
    aiVerification: "true",
    adminConfirmation: "true",
    status: "verified",
    authorityStatus: "in_progress",
    votesUp: 18,
    votesDown: 2,
    comments: [{ by: "lifeguard_anu", text: "Confirmed from tower patrol." }],
    reportedAt: "Today 07:45"
  },
  {
    type: "Oil Spills",
    description: "Thin oil sheen spotted near harbor edge around fishing jetty. Cleanup request escalated to local authority.",
    severity: "high",
    latitude: 18.94,
    longitude: 72.835,
    areaName: "Old Harbor",
    aiVerification: "true",
    adminConfirmation: "true",
    status: "verified",
    authorityStatus: "pending",
    votesUp: 26,
    votesDown: 1,
    comments: [{ by: "marine_watch", text: "Photo evidence matches vessel trail." }],
    reportedAt: "Yesterday 16:10"
  }
];

function statusClass(status) {
  const s = (status || "pending").toLowerCase();
  if (s === "resolved") return "status-resolved";
  if (s === "in_progress") return "status-in_progress";
  return "status-pending";
}

async function seedReportsIfEmpty() {
  const snapshot = await getDocs(collection(db, "reports"));
  if (!snapshot.empty) return;

  for (const r of seededReports) {
    await addDoc(collection(db, "reports"), {
      userId: "seed-user",
      username: "marine_watch",
      ...r,
      imageUrl: "",
      mediaType: "",
      createdAt: serverTimestamp()
    });
  }
}

function updateAdminStats(list) {
  const total = list.length;
  const pending = list.filter((r) => (r.authorityStatus || "pending") === "pending").length;
  const progress = list.filter((r) => (r.authorityStatus || "pending") === "in_progress").length;
  const resolved = list.filter((r) => (r.authorityStatus || "pending") === "resolved").length;

  document.getElementById("totalReports").textContent = String(total);
  document.getElementById("pendingReports").textContent = String(pending);
  document.getElementById("progressReports").textContent = String(progress);
  document.getElementById("resolvedReports").textContent = String(resolved);
}

async function loadReports() {
  await seedReportsIfEmpty();
  const snapshot = await getDocs(collection(db, "reports"));
  const container = document.getElementById("reports");
  const list = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
  updateAdminStats(list);

  container.innerHTML = "";
  list.forEach((data) => {
    container.innerHTML += `
      <article class="admin-report-card">
        <div class="admin-report-head">
          <h3>${data.type || "Unlabeled report"}</h3>
          <span class="status-chip ${statusClass(data.authorityStatus)}">${(data.authorityStatus || "pending").replace("_", " ")}</span>
        </div>
        <p class="admin-report-desc">${data.description || "No description provided."}</p>
        <p class="report-meta">Verification: ${(data.status || "pending").toUpperCase()}</p>
        <p class="report-meta">Admin Confirmation: ${(data.adminConfirmation || "pending").toUpperCase()}</p>
        <div class="report-actions">
          <button class="btn-primary" onclick="verify('${data.id}')">Confirm True</button>
          <button class="btn-danger" onclick="reject('${data.id}')">Mark False</button>
        </div>
        <div class="report-actions">
          <button class="btn-danger" onclick="setAuthorityStatus('${data.id}','pending')">Pending</button>
          <button class="btn-secondary" onclick="setAuthorityStatus('${data.id}','in_progress')">In Progress</button>
          <button class="btn-primary" onclick="setAuthorityStatus('${data.id}','resolved')">Resolved</button>
        </div>
      </article>
    `;
  });
}

window.verify = async (id) => {
  await updateDoc(doc(db, "reports", id), { status: "verified", adminConfirmation: "true" });
  loadReports();
};

window.reject = async (id) => {
  await updateDoc(doc(db, "reports", id), { status: "rejected", adminConfirmation: "no" });
  loadReports();
};

window.setAuthorityStatus = async (id, authorityStatus) => {
  await updateDoc(doc(db, "reports", id), { authorityStatus });
  loadReports();
};

window.logout = () => window.location.href = "login.html";

loadReports();
</script>

</body>
</html>
