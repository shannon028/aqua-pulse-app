<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Pulse | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <main class="auth-shell">
        <section class="auth-hero">
            <div class="logo-badge" aria-hidden="true">
                <svg viewBox="0 0 64 64" role="img">
                    <defs>
                        <linearGradient id="waveFill" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#72d9ff"></stop>
                            <stop offset="100%" stop-color="#48c8a9"></stop>
                        </linearGradient>
                    </defs>
                    <circle cx="32" cy="32" r="28" fill="#e8f9ff"></circle>
                    <path d="M11 37 C17 29, 25 30, 31 35 C38 41, 46 41, 53 33 L53 45 L11 45 Z" fill="url(#waveFill)"></path>
                    <path d="M12 28 C18 21, 24 21, 31 26 C38 31, 45 31, 52 23" fill="none" stroke="#0d89bf" stroke-width="3.4" stroke-linecap="round"></path>
                </svg>
            </div>
            <h1>Aqua Pulse</h1>
            <p>Coastal safety intelligence for real-time marine hazard reporting.</p>
        </section>

        <section class="panel auth-card auth-card-light">
            <h2>Welcome Back</h2>
            <p>Sign in to continue to your safety dashboard.</p>

            <!-- ❌ OLD WRONG LINE (kept but commented) -->
            <!-- <form id="loginForm" class="auth-form"></form> -->

            <!-- ✅ FIXED FORM -->
            <form id="loginForm" class="auth-form">

                <select id="roleSelect">
                    <option value="user">I am a User</option>
                    <option value="admin">I am an Administrator</option>
                </select>

                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>

                <button type="submit" class="btn-primary">Sign In</button>

                <!-- ❌ Google function not defined (kept but disabled safely) -->
                <!-- <button class="btn-google" onclick="loginWithGoogle()">Sign In with Google</button> -->

                <!-- ✅ Safe version -->
                <button type="button" class="btn-google">Sign In with Google</button>

            </form>

            <div class="auth-footer">
                <span>New to Aqua Pulse?</span>
                <a class="link-button" href="signup.html">Create an account</a>
            </div>
        </section>
    </main>

<!-- ❌ OLD FIREBASE (kept but disabled to avoid conflict) -->
<!-- <script src="../firebase/config.js"></script> -->
<!-- <script src="auth.js"></script> -->

<!-- ✅ MODERN LOGIN SCRIPT ONLY -->
<script type="module" src="login.js"></script>

</body>
</html>
